services:
  backend:
    build: ./back
    container_name: cyber-backend
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - cyber-net

  frontend:
    build: ./front
    container_name: cyber-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - cyber-net

networks:
  cyber-net:
    driver: bridge